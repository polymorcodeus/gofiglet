# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2
before:
  hooks: ["go mod tidy"]
builds: [skip: true]
changelog:
  sort: asc
  use: github
  format: "{{ .SHA }}: {{ .Message }} ({{ with .AuthorUsername }}@{{ . }}{{ else }}{{ .AuthorName }}{{ end }})"
  filters:
    exclude:
      - "^test:"
      - "^chore"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: "Deps"
      regexp: "^.*\\(deps\\)*:+.*$"
      order: 300
    - title: "New!"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 100
    - title: "Fixed"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 200
    - title: "Docs"
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 400
    - title: "Other stuff"
      order: 9999

release:
  github:
    owner: polymorcodeus
    name: gofiglet
  draft: false
  prerelease: auto
  mode: replace

  footer: |
    ---
    **Full Changelog**: https://github.com/polymorcodeus/gofiglet/compare/{{.PreviousTag}}...{{.Tag}}
